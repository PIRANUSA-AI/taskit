name: Deploy ke VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.VPS_SSH_KEY }}' > ~/.ssh/vps
          chmod 600 ~/.ssh/vps
          ssh -i ~/.ssh/vps \
            -o StrictHostKeyChecking=accept-new \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_DIR }} && \
             git pull origin main && \
             npm --prefix backend install && \
             npm --prefix frontend install && \
             npm run build && \
             pm2 restart pinote-api pinote-worker && \
             pm2 save"
