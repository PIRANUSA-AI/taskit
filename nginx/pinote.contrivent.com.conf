# Nginx vhost — pinote.contrivent.com
# Copy to /etc/nginx/sites-available/pinote.contrivent.com.conf
# Then: ln -s /etc/nginx/sites-available/pinote.contrivent.com.conf /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name pinote.contrivent.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pinote.contrivent.com;

    # --- SSL (Let's Encrypt via certbot) ---
    ssl_certificate     /etc/letsencrypt/live/pinote.contrivent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pinote.contrivent.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Frontend static files ---
    root /var/www/pinote.contrivent.com/dist;
    index index.html;

    # --- API reverse proxy (strip /api prefix) ---
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check endpoint (also proxied)
    location = /api/health {
        rewrite ^ /health break;
        proxy_pass http://127.0.0.1:3000;
    }
    location = /api/health/live {
        rewrite ^ /health/live break;
        proxy_pass http://127.0.0.1:3000;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static asset caching ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
